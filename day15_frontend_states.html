<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Examiner Victoria State Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            line-height: 1.6;
        }

        textarea {
            width: 700px;
            max-width: 100%;
            font-size: 16px;
        }

        button {
            padding: 8px 16px;
            font-size: 16px;
            cursor: pointer;
        }

        .box {
            margin-top: 20px;
            padding: 16px;
            border: 1px solid #ccc;
            border-radius: 8px;
            width: 700px;
            max-width: 100%;
            white-space: pre-wrap;
        }

        .idle {
            background: #f5f5f5;
        }

        .loading {
            background: #fff3cd;
        }

        .success {
            background: #e8f5e9;
        }

        .error {
            background: #fdecea;
        }
    </style>
</head>
<body>
    <h1>Examiner Victoria State Demo</h1>

    <p><strong>Question:</strong></p>
    <p id="questionText">Describe a city you want to visit.</p>

    <p><strong>Your Answer:</strong></p>
    <textarea id="answerInput" rows="6">I want to visit Paris because it has beautiful architecture.</textarea>

    <br /><br />
    <button id="submitButton" onclick="submitAnswer()">Submit Answer</button>

    <h2>Page State</h2>
    <div id="stateBox" class="box idle">Idle: waiting for user input.</div>

    <h2>API Response</h2>
    <pre id="resultBox" class="box idle">No response yet.</pre>

    <script>
        function setState(state, message) {
            const stateBox = document.getElementById("stateBox");
            stateBox.className = "box " + state;
            stateBox.innerText = message;
        }

        function showResult(state, data) {
            const resultBox = document.getElementById("resultBox");
            resultBox.className = "box " + state;
            resultBox.innerText = JSON.stringify(data, null, 2);
        }

        async function submitAnswer() {
            const submitButton = document.getElementById("submitButton");
            const questionText = document.getElementById("questionText").innerText;
            const userAnswer = document.getElementById("answerInput").value;

            const requestBody = {
                session_id: "practice_001",
                question: questionText,
                user_answer: userAnswer,
                target_score: 7.0
            };

            try {
                submitButton.disabled = true;
                submitButton.innerText = "Submitting...";
                setState("loading", "Loading: submitting your answer to the backend API...");

                const response = await fetch("http://127.0.0.1:8000/api/answer", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(requestBody)
                });

                const responseBody = await response.json();

                if (responseBody.status === "ok") {
                    setState("success", "Success: feedback generated successfully.");
                    showResult("success", responseBody);
                } else {
                    setState("error", "Error: the answer needs user action. Please revise your answer.");
                    showResult("error", responseBody);
                }
            } catch (error) {
                setState("error", "Error: failed to connect to the backend API.");
                showResult("error", {
                    error_message: String(error)
                });
            } finally {
                submitButton.disabled = false;
                submitButton.innerText = "Submit Answer";
            }
        }
    </script>
</body>
</html>
