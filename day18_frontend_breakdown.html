<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Examiner Victoria Frontend Breakdown</title>

    <style>
        body {
            max-width: 800px;
            margin: 40px auto;
            font-family: Arial, sans-serif;
        }

        textarea {
            width: 100%;
            min-height: 120px;
            padding: 12px；
        }

        button {
            margin-top: 16px;
            padding: 10px 18px;
            cursor: pointer;
        }

        .result-card {
            margin-top: 24px;
            padding: 16px;
            border: 1px solid #cccccc;
            border-radius: 16px;
        }

        .success {
            background-color: #eef8ee;
        }

        .error {
            background-color: #fff0ee;
        }
    </style>
</head>

<body>
    <h1>Examiner Victoria Answer Checker</h1>

    <p><strong>Question:</strong></p>
    <p id="questionText">Describe a person who helped you.</p>

    <p><strong>Your Answer:</strong></p>
    <textarea id="answerInput"></textarea>

      <p id="characterCount">Characters: 0</p> 

    <button id="submitButton">Check Answer</button>

    <div id="resultCard" class="result-card">
        No result yet.   
    </div>

    <script>
        const minimumAnswerLength = 10;

        const answerInput = document.getElementById("answerInput");
        const submitButton = document.getElementById("submitButton");
        const resultCard = document.getElementById("resultCard");
        const characterCount = document.getElementById("characterCount");

        answerInput.addEventListener("input", function () {
    characterCount.innerText = "Characters: " + answerInput.value.length;
});

        function checkAnswer() {
            const userAnswer = answerInput.value.trim();

            if (!userAnswer) {
                resultCard.className = "result-card error";
                resultCard.innerText = "Please enter your answer first.";
                return;
            }

            if (userAnswer.length < minimumAnswerLength) {
                resultCard.className = "result-card error";
                resultCard.innerText = "Your answer is too short.";
                return;
            }

            resultCard.className = "result-card success";
            resultCard.innerText = "Your answer is ready to submit.";
        }

        submitButton.addEventListener("click", checkAnswer);
    </script>
</body>
</html>
